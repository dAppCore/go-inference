<!-- @dsCard group="Colors" viewport="700x150" name="Tinted pills + hairlines" subtitle="How state colours read as pill tints; the three hairline weights." -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Colours — Pills + Lines</title><link rel="stylesheet" href="../styles.css"><style>html,body{margin:0}.wrap{background:var(--ink-1);padding:24px;height:150px;box-sizing:border-box;display:flex;flex-direction:column;gap:20px;justify-content:center}.row{display:flex;gap:10px;align-items:center}.lines{display:flex;flex-direction:column;gap:12px}.lrow{display:flex;align-items:center;gap:12px}.hair{flex:1;height:1px}.n{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-3);width:56px}</style></head>
<body><div class="wrap">
<div class="row"><span class="pill">neutral</span><span class="pill pill-brand">brand</span><span class="pill pill-success">success</span><span class="pill pill-warn">warning</span></div>
<div class="lines">
<div class="lrow"><span class="n">line-1</span><span class="hair" style="background:var(--line-1)"></span></div>
<div class="lrow"><span class="n">line-2</span><span class="hair" style="background:var(--line-2)"></span></div>
<div class="lrow"><span class="n">line-3</span><span class="hair" style="background:var(--line-3)"></span></div>
</div>
</div></body></html>
