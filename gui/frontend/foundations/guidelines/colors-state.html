<!-- @dsCard group="Colors" viewport="700x150" name="State colours" subtitle="Success · warning · danger · info. Desaturated for dark-calm." -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Colours — State</title><link rel="stylesheet" href="../styles.css"><style>html,body{margin:0}.wrap{background:var(--ink-1);padding:22px;display:flex;gap:14px;height:150px;box-sizing:border-box}.c{flex:1;display:flex;flex-direction:column;gap:6px}.sw{height:70px;border-radius:10px}.n{font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}.v{font-family:var(--font-mono);font-size:9px;color:var(--fg-4)}</style></head>
<body><div class="wrap">
<div class="c"><div class="sw" style="background:var(--success-500)"></div><span class="n">success</span></div>
<div class="c"><div class="sw" style="background:var(--warning-500)"></div><span class="n">warning</span></div>
<div class="c"><div class="sw" style="background:var(--danger-500)"></div><span class="n">danger</span></div>
<div class="c"><div class="sw" style="background:var(--info-500)"></div><span class="n">info</span></div>
</div></body></html>
