<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>html,body{margin:0}.wrap{background:var(--ink-1);padding:24px;box-sizing:border-box;display:flex;gap:16px;align-items:flex-end}.c{display:flex;flex-direction:column;gap:8px;align-items:center}.b{width:64px;height:64px;background:var(--ink-3);border:1px solid var(--line-2)}.n{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-3)}</style></head>
<body><div class="wrap">
<div class="c"><div class="b" style="border-radius:var(--r-xs)"></div><span class="n">xs · 4</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-sm)"></div><span class="n">sm · 6</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-md)"></div><span class="n">md · 8</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-lg)"></div><span class="n">lg · 12</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-xl)"></div><span class="n">xl · 16</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-2xl)"></div><span class="n">2xl · 22</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-pill)"></div><span class="n">pill</span></div>
</div></body></html>
