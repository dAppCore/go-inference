version: "3"

tasks:
  build:
    dir: ../../..
    cmds:
      - go build ./...

  test:
    dir: ../../..
    cmds:
      - go test -count=1 -race ./...

  test-discover:
    dir: ../../..
    cmds:
      - go test -count=1 -race -run '^TestDiscover_Good_SingleModel$' ./...

  vet:
    dir: ../../..
    cmds:
      - go vet ./...
