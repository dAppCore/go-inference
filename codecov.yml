# codecov.yml — go-inference coverage gate.
#
# The uploaded profile is the PORTABLE suite (`task cover` -> coverage.out):
# default build tags, the same surface a Linux CI compiles. engine/metal
# (darwin/arm64, //go:build metal_runtime) is not in this report — it is
# exercised by `task test:metal` on the Mac, not counted here.

coverage:
  precision: 1
  round: down
  range: "90...100"
  status:
    project:
      default:
        target: 95%
        threshold: 1%
    patch:
      default:
        target: 95%
        threshold: 1%

comment:
  layout: "reach, diff, flags, files"
  require_changes: false

# Not our source / not in the portable coverage.out — kept out of the report.
ignore:
  - "external"   # vendored submodule deps (Apple MLX + the go-* externals)
  - "patches"    # MLX patch set, applied at build time — not our source
  - "build"      # build artifacts (metallibs, cmake trees)
  - "gui"        # separate Wails module, absent from the core coverage.out
